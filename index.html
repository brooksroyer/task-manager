<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e22;
    --surface3: #26262c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --text2: #9a9aa8;
    --text3: #5c5c6e;
    --accent: #6b8afd;
    --accent-dim: rgba(107,138,253,0.15);
    --red: #e05a5a;
    --red-dim: rgba(224,90,90,0.15);
    --amber: #e8a44a;
    --amber-dim: rgba(232,164,74,0.15);
    --green: #52c48a;
    --green-dim: rgba(82,196,138,0.15);
    --purple: #b07ef8;
    --purple-dim: rgba(176,126,248,0.15);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .app-shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }
  .app-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  .app-title span {
    color: var(--accent);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 3px;
    border: 0.5px solid var(--border);
  }
  .tab {
    padding: 5px 16px;
    font-size: 13px;
    font-family: var(--font);
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .tab.active {
    background: var(--surface3);
    color: var(--text);
    border: 0.5px solid var(--border2);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* Buttons */
  .btn {
    padding: 7px 16px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover { opacity: 0.88; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 80px;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 3px;
    font-family: var(--mono);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters select, .filters input[type="text"] {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--radius);
    height: 32px;
    outline: none;
  }
  .filters select:focus, .filters input:focus {
    border-color: var(--accent);
  }
  .filters input[type="text"] { width: 180px; }

  /* Task table */
  .table-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: visible;
  }
  .task-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .task-table th {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-align: left;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .6px;
    background: var(--surface2);
  }
  .task-table td {
    font-size: 13px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    vertical-align: middle;
    color: var(--text);
    white-space: nowrap;
  }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tbody tr:hover td { background: var(--surface2); }

  .col-name { width: 22%; }
  .col-status { width: 10%; }
  .col-segment { width: 9%; }
  .col-priority { width: 9%; }
  .col-start { width: 9%; }
  .col-due { width: 9%; }
  .col-link { width: 8%; }
  .col-notes { width: 17%; }
  .col-actions { width: 7%; }

  .task-name-cell { font-weight: 500; }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    font-family: var(--mono);
  }
  .p-critical { background: var(--red-dim); color: var(--red); }
  .p-high { background: var(--amber-dim); color: var(--amber); }
  .p-medium { background: var(--accent-dim); color: var(--accent); }
  .p-low { background: var(--green-dim); color: var(--green); }
  .s-todo { background: var(--surface3); color: var(--text2); }
  .s-inprogress { background: var(--purple-dim); color: var(--purple); }
  .s-done { background: var(--green-dim); color: var(--green); }
  .s-blocked { background: var(--red-dim); color: var(--red); }
  .seg-work { background: rgba(107,138,253,0.12); color: #6b8afd; border: 0.5px solid rgba(107,138,253,0.3); }
  .seg-personal { background: rgba(232,164,74,0.12); color: #e8a44a; border: 0.5px solid rgba(232,164,74,0.3); }
  .seg-other { background: var(--surface3); color: var(--text2); border: 0.5px solid var(--border2); }

  .overdue { color: var(--red) !important; font-weight: 600; }
  .task-link-btn {
    color: var(--accent);
    font-size: 12px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .task-link-btn:hover { text-decoration: underline; }

  .action-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    padding: 3px 6px;
    border-radius: 4px;
    transition: all .1s;
  }
  .action-btn:hover { background: var(--surface3); color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 3.5rem 1rem;
    color: var(--text3);
    font-size: 14px;
  }
  .empty-state p { margin-top: 8px; font-size: 13px; }

  /* Calendar */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .cal-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .cal-nav {
    display: flex;
    gap: 4px;
  }
  .cal-nav button {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    width: 30px;
    height: 30px;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .12s;
  }
  .cal-nav button.today-btn { width: auto; padding: 0 12px; font-size: 12px; font-family: var(--font); font-weight: 500; }
  .cal-nav button:hover { background: var(--surface3); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day-label {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    padding: 6px 0;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .cal-day {
    min-height: 88px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 7px;
    background: var(--surface);
    transition: border-color .1s;
  }
  .cal-day:hover { border-color: var(--border2); }
  .cal-day.today { border-color: var(--accent); background: var(--accent-dim); }
  .cal-day.other-month { background: transparent; opacity: .4; }
  .cal-day-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 5px;
    font-family: var(--mono);
  }
  .cal-day.today .cal-day-num { color: var(--accent); }
  .cal-task-chip {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
    font-family: var(--mono);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    width: 500px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 1.25rem;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }
  .form-group label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { min-height: 70px; resize: vertical; line-height: 1.5; }
  .form-group select option { background: var(--surface2); }
  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }

  /* Confirm */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    width: 340px;
    text-align: center;
    animation: slideUp .2s ease;
  }
  .confirm-box p { font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.6; }
  .confirm-footer { display: flex; gap: 8px; justify-content: center; }

  /* View toggle */
  .view { display: none; }
  .view.active { display: block; }

  /* Inline editing */
  .badge.clickable { cursor: pointer; transition: opacity .12s; }
  .badge.clickable:hover { opacity: 0.75; }
  .inline-select-wrap { position: relative; display: inline-block; }
  .inline-dropdown {
    position: fixed;
    z-index: 9999;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 4px;
    min-width: 130px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .inline-option {
    display: block;
    width: 100%;
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--font);
    background: transparent;
    border: none;
    color: var(--text2);
    text-align: left;
    cursor: pointer;
    border-radius: 5px;
    transition: background .1s;
  }
  .inline-option:hover { background: var(--surface3); color: var(--text); }
  .inline-option.active-opt { color: var(--text); font-weight: 500; }
  .date-clickable {
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 12px;
    transition: background .12s;
    display: inline-block;
  }
  .date-clickable:hover { background: var(--surface3); }
  .date-clickable.empty { color: var(--text3); }
  .inline-date-wrap { position: relative; display: inline-block; }
  .inline-date-picker {
    position: fixed;
    z-index: 9999;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .inline-date-picker input[type="date"] {
    background: var(--surface3);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: var(--radius);
    outline: none;
    display: block;
    margin-bottom: 6px;
  }
  .inline-date-picker input[type="date"]:focus { border-color: var(--accent); }
  .inline-date-actions { display: flex; gap: 5px; justify-content: flex-end; }
  .inline-date-actions button { font-size: 11px; padding: 3px 10px; border-radius: 5px; border: none; cursor: pointer; font-family: var(--font); }
  .idb-cancel { background: transparent; color: var(--text2); border: 0.5px solid var(--border2) !important; }
  .idb-save { background: var(--accent); color: #fff; }

  /* Calendar week view */
  .cal-week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-week-day { min-height: 160px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px; background: var(--surface); }
  .cal-week-day.today { border-color: var(--accent); background: var(--accent-dim); }
  .cal-week-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .6px; text-align: center; padding: 6px 0; }
  .cal-week-dayname { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 2px; }
  .cal-mode-tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius); padding: 2px; border: 0.5px solid var(--border); }
  .cal-mode-tab { padding: 3px 12px; font-size: 12px; font-family: var(--font); border: none; background: transparent; color: var(--text2); border-radius: 5px; cursor: pointer; font-weight: 500; transition: all .12s; }
  .cal-mode-tab.active { background: var(--surface3); color: var(--text); border: 0.5px solid var(--border2); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* input[type=date] color fix for dark */
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  @media (max-width: 700px) {
    .col-start, .col-notes, .col-segment { display: none; }
    .filters input[type="text"] { width: 130px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-title">Task<span>.</span></div>
    <div class="header-right">
      <div class="tabs">
        <button class="tab active" onclick="switchView('list', this)">List</button>
        <button class="tab" onclick="switchView('calendar', this)">Calendar</button>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ New task</button>
    </div>
  </div>

  <!-- List View -->
  <div id="view-list" class="view active">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="filters">
      <select id="filter-status" onchange="renderList()">
        <option value="">All statuses</option>
        <option>To do</option><option>In progress</option><option>Complete</option><option>Blocked</option>
      </select>
      <select id="filter-segment" onchange="renderList()">
        <option value="">All segments</option>
        <option>Work</option><option>Personal</option>
      </select>
      <select id="filter-priority" onchange="renderList()">
        <option value="">All priorities</option>
        <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search tasks..." oninput="renderList()">
    </div>
    <div class="table-wrap">
      <table class="task-table">
        <thead>
          <tr>
            <th class="col-name">Task</th>
            <th class="col-status">Status</th>
            <th class="col-segment">Segment</th>
            <th class="col-priority">Priority</th>
            <th class="col-start">Start</th>
            <th class="col-due">Due</th>
            <th class="col-link">Link</th>
            <th class="col-notes">Notes</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="task-tbody"></tbody>
      </table>
      <div id="empty-list" class="empty-state">
        <div style="font-size:28px">&#9998;</div>
        <p>No tasks yet &mdash; hit <strong>+ New task</strong> to get started.</p>
      </div>
    </div>
  </div>

  <!-- Calendar View -->
  <div id="view-calendar" class="view">
    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="cal-mode-tabs">
          <button class="cal-mode-tab active" onclick="setCalMode('month',this)">Month</button>
          <button class="cal-mode-tab" onclick="setCalMode('week',this)">Week</button>
        </div>
        <div class="cal-nav">
          <button onclick="calNav(-1)">&#8249;</button>
          <button class="today-btn" onclick="calNav(0)">Today</button>
          <button onclick="calNav(1)">&#8250;</button>
        </div>
      </div>
    </div>
    <div id="cal-day-labels-wrap">
      <div class="cal-grid" id="cal-day-labels"></div>
    </div>
    <div id="cal-body"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">New task</h2>
    <div class="form-group">
      <label>Task name</label>
      <input id="f-name" type="text" placeholder="What needs doing?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option>To do</option><option>In progress</option><option>Complete</option><option>Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label>Segment</label>
        <select id="f-segment">
          <option>Work</option><option>Personal</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="f-priority" style="width:100%">
        <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start date</label>
        <input id="f-start" type="date">
      </div>
      <div class="form-group">
        <label>Due date</label>
        <input id="f-due" type="date">
      </div>
    </div>
    <div class="form-group">
      <label>File / URL link</label>
      <input id="f-link" type="text" placeholder="https:// or SharePoint/OneDrive URL">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional notes..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save task</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg">Delete this task? This cannot be undone.</p>
    <div class="confirm-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmAction()">Delete</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'taskmanager_v2';
let tasks = [];
let editingId = null;
let confirmCb = null;
let calYear, calMonth, calWeekStart;
let calMode = 'month';

const INLINE_OPTIONS = {
  status: ['To do','In progress','Complete','Blocked'],
  priority: ['Critical','High','Medium','Low'],
  segment: ['Work','Personal']
};

function closeAllInline() {
  document.querySelectorAll('.inline-dropdown, .inline-date-picker').forEach(el => el.remove());
}

function openInlineSelect(e, id, field) {
  e.stopPropagation();
  closeAllInline();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const rect = e.target.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'inline-dropdown';
  dropdown.style.top = (rect.bottom + 4) + 'px';
  dropdown.style.left = rect.left + 'px';
  INLINE_OPTIONS[field].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'inline-option' + (task[field] === opt ? ' active-opt' : '');
    btn.textContent = opt;
    btn.onclick = (ev) => {
      ev.stopPropagation();
      task[field] = opt;
      saveTasks();
      renderAll();
    };
    dropdown.appendChild(btn);
  });
  document.body.appendChild(dropdown);
}

function openInlineDate(e, id, field) {
  e.stopPropagation();
  closeAllInline();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const rect = e.target.getBoundingClientRect();
  const picker = document.createElement('div');
  picker.className = 'inline-date-picker';
  picker.style.top = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  const input = document.createElement('input');
  input.type = 'date';
  input.value = task[field] || '';
  const actions = document.createElement('div');
  actions.className = 'inline-date-actions';
  const cancel = document.createElement('button');
  cancel.className = 'idb-cancel';
  cancel.textContent = 'Cancel';
  cancel.onclick = (ev) => { ev.stopPropagation(); closeAllInline(); };
  const save = document.createElement('button');
  save.className = 'idb-save';
  save.textContent = 'Save';
  save.onclick = (ev) => {
    ev.stopPropagation();
    task[field] = input.value;
    saveTasks();
    renderAll();
  };
  actions.appendChild(cancel);
  actions.appendChild(save);
  picker.appendChild(input);
  picker.appendChild(actions);
  document.body.appendChild(picker);
  setTimeout(() => input.focus(), 50);
}

document.addEventListener('click', () => closeAllInline());

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tasks = JSON.parse(raw);
  } catch(e) { tasks = []; }
  renderAll();
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function statusClass(s) {
  const map = {'To do':'s-todo','In progress':'s-inprogress','Complete':'s-done','Blocked':'s-blocked'};
  return map[s] || 's-todo';
}
function priorityClass(p) {
  const map = {'Critical':'p-critical','High':'p-high','Medium':'p-medium','Low':'p-low'};
  return map[p] || 'p-medium';
}
function segmentClass(s) {
  if (s === 'Work') return 'seg-work';
  if (s === 'Personal') return 'seg-personal';
  return 'seg-other';
}
function chipStyle(p) {
  const map = {
    'Critical':'background:rgba(224,90,90,.2);color:#e05a5a',
    'High':'background:rgba(232,164,74,.2);color:#e8a44a',
    'In progress':'background:rgba(176,126,248,.2);color:#b07ef8',
    'Medium':'background:rgba(107,138,253,.2);color:#6b8afd',
    'Low':'background:rgba(82,196,138,.2);color:#52c48a'
  };
  return map[p] || 'background:rgba(107,138,253,.2);color:#6b8afd';
}
function fmt(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y.slice(2)}`;
}
function isOverdue(d) {
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(d + 'T00:00:00') < today;
}

function renderStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'Complete').length;
  const inprog = tasks.filter(t => t.status === 'In progress').length;
  const blocked = tasks.filter(t => t.status === 'Blocked').length;
  const overdue = tasks.filter(t => t.status !== 'Complete' && isOverdue(t.due)).length;
  const el = document.getElementById('stats-bar');
  el.innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${inprog}</div><div class="stat-label">In progress</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${blocked}</div><div class="stat-label">Blocked</div></div>
    ${overdue > 0 ? `<div class="stat-card"><div class="stat-num" style="color:var(--amber)">${overdue}</div><div class="stat-label">Overdue</div></div>` : ''}
  `;
}

function renderList() {
  const fs = document.getElementById('filter-status').value;
  const fseg = document.getElementById('filter-segment').value;
  const fp = document.getElementById('filter-priority').value;
  const fq = document.getElementById('filter-search').value.toLowerCase();
  const prioOrder = ['Critical','High','Medium','Low'];
  let filtered = tasks.filter(t => {
    if (fs && t.status !== fs) return false;
    if (fseg && t.segment !== fseg) return false;
    if (fp && t.priority !== fp) return false;
    if (fq && !t.name.toLowerCase().includes(fq) && !(t.notes||'').toLowerCase().includes(fq)) return false;
    return true;
  }).sort((a,b) => prioOrder.indexOf(a.priority) - prioOrder.indexOf(b.priority));

  const tbody = document.getElementById('task-tbody');
  const empty = document.getElementById('empty-list');

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map(t => {
      const od = t.status !== 'Complete' && isOverdue(t.due);
      const notesTrunc = t.notes ? (t.notes.length > 40 ? t.notes.slice(0,40)+'…' : t.notes) : '';
      return `<tr data-id="${t.id}">
        <td class="col-name task-name-cell" title="${t.name}">${t.name}</td>
        <td class="col-status">
          <div class="inline-select-wrap">
            <span class="badge ${statusClass(t.status)} clickable" onclick="openInlineSelect(event,'${t.id}','status')">${t.status}</span>
          </div>
        </td>
        <td class="col-segment">
          <div class="inline-select-wrap">
            <span class="badge ${segmentClass(t.segment)} clickable" onclick="openInlineSelect(event,'${t.id}','segment')">${t.segment||''}</span>
          </div>
        </td>
        <td class="col-priority">
          <div class="inline-select-wrap">
            <span class="badge ${priorityClass(t.priority)} clickable" onclick="openInlineSelect(event,'${t.id}','priority')">${t.priority}</span>
          </div>
        </td>
        <td class="col-start" style="color:var(--text2);font-size:12px">${fmt(t.start)}</td>
        <td class="col-due" style="font-size:12px">
          <div class="inline-date-wrap">
            <span class="date-clickable${t.due ? (od ? ' overdue' : '') : ' empty'}" onclick="openInlineDate(event,'${t.id}','due')">${t.due ? fmt(t.due) + (od ? ' !' : '') : '+ set date'}</span>
          </div>
        </td>
        <td class="col-link">${t.link ? `<a class="task-link-btn" href="${t.link}" target="_blank" rel="noopener">&#128279; link</a>` : ''}</td>
        <td class="col-notes" style="color:var(--text2);font-size:12px" title="${t.notes||''}">${notesTrunc}</td>
        <td class="col-actions" style="white-space:nowrap">
          <button class="action-btn" onclick="openModal('${t.id}')" title="Edit">&#9998;</button>
          <button class="action-btn" onclick="askDelete('${t.id}')" title="Delete">&#10005;</button>
        </td>
      </tr>`;
    }).join('');
  }
  renderStats();
}

function getWeekStart(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderCalendar() {
  const now = new Date();
  const todayStr = dateStr(now);
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  if (calMode === 'week') {
    if (!calWeekStart) calWeekStart = getWeekStart(now);
    const ws = calWeekStart;
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const fmtShort = d => `${monthNames[d.getMonth()].slice(0,3)} ${d.getDate()}`;
    document.getElementById('cal-title').textContent = `${fmtShort(ws)} – ${fmtShort(we)}, ${we.getFullYear()}`;

    const labelsEl = document.getElementById('cal-day-labels');
    labelsEl.className = 'cal-week-grid';
    labelsEl.innerHTML = '';

    const body = document.getElementById('cal-body');
    body.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'cal-week-grid';
    grid.style.marginTop = '4px';

    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(d.getDate() + i);
      const ds = dateStr(d);
      const isToday = ds === todayStr;
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      const lbl = document.createElement('div');
      lbl.className = 'cal-week-label';
      lbl.textContent = dayNames[d.getDay()];
      labelsEl.appendChild(lbl);

      const dayTasks = tasks.filter(t => {
        if (!t.due) return false;
        if (t.start && t.start <= ds && t.due >= ds) return true;
        return t.due === ds;
      });
      const chips = dayTasks.slice(0,6).map(t =>
        `<div class="cal-task-chip" style="${chipStyle(t.priority)};margin-bottom:3px" title="${t.name}">${t.name}</div>`
      ).join('');
      const more = dayTasks.length > 6 ? `<div style="font-size:10px;color:var(--text3)">+${dayTasks.length-6} more</div>` : '';

      const cell = document.createElement('div');
      cell.className = `cal-week-day${isToday ? ' today' : ''}`;
      cell.innerHTML = `<div class="cal-day-num">${d.getDate()}</div>${chips}${more}`;
      grid.appendChild(cell);
    }
    body.appendChild(grid);

  } else {
    if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
    document.getElementById('cal-title').textContent = `${monthNames[calMonth]} ${calYear}`;

    const labelsEl = document.getElementById('cal-day-labels');
    labelsEl.className = 'cal-grid';
    labelsEl.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d =>
      `<div class="cal-day-label">${d}</div>`).join('');

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    let cells = [];
    for (let i = 0; i < firstDay; i++) {
      const d = daysInPrev - firstDay + 1 + i;
      cells.push({ day: d, cur: false, ds: `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}` });
    }
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ day: d, cur: true, ds: `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` });
    }
    let extra = 0;
    while (cells.length % 7 !== 0) { extra++; cells.push({ day: extra, cur: false, ds: '' }); }

    const body = document.getElementById('cal-body');
    body.innerHTML = `<div class="cal-grid" style="margin-top:4px">${cells.map(c => {
      const isToday = c.ds === todayStr;
      const dayTasks = c.cur ? tasks.filter(t => {
        if (!t.due) return false;
        if (t.start && t.start <= c.ds && t.due >= c.ds) return true;
        return t.due === c.ds;
      }) : [];
      const chips = dayTasks.slice(0,3).map(t =>
        `<div class="cal-task-chip" style="${chipStyle(t.priority)}" title="${t.name}">${t.name}</div>`
      ).join('');
      const more = dayTasks.length > 3 ? `<div style="font-size:10px;color:var(--text3)">+${dayTasks.length-3} more</div>` : '';
      return `<div class="cal-day${isToday?' today':''}${!c.cur?' other-month':''}">
        <div class="cal-day-num">${c.day}</div>${chips}${more}
      </div>`;
    }).join('')}</div>`;
  }
}

function setCalMode(mode, btn) {
  calMode = mode;
  document.querySelectorAll('.cal-mode-tab').forEach(el => el.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (mode === 'week' && !calWeekStart) calWeekStart = getWeekStart(new Date());
  renderCalendar();
}

function calNav(dir) {
  if (calMode === 'week') {
    if (!calWeekStart) calWeekStart = getWeekStart(new Date());
    if (dir === 0) { calWeekStart = getWeekStart(new Date()); }
    else { calWeekStart = new Date(calWeekStart); calWeekStart.setDate(calWeekStart.getDate() + dir * 7); }
  } else {
    if (dir === 0) { const n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth(); }
    else { calMonth += dir; if (calMonth > 11) { calMonth = 0; calYear++; } else if (calMonth < 0) { calMonth = 11; calYear--; } }
  }
  renderCalendar();
}

function renderAll() { renderList(); renderCalendar(); }

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  if (btn) btn.classList.add('active');
  if (v === 'calendar') renderCalendar();
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit task' : 'New task';
  if (id) {
    const t = tasks.find(x => x.id === id);
    if (t) {
      document.getElementById('f-name').value = t.name || '';
      document.getElementById('f-status').value = t.status || 'To do';
      document.getElementById('f-segment').value = t.segment || 'Work';
      document.getElementById('f-priority').value = t.priority || 'Medium';
      document.getElementById('f-start').value = t.start || '';
      document.getElementById('f-due').value = t.due || '';
      document.getElementById('f-link').value = t.link || '';
      document.getElementById('f-notes').value = t.notes || '';
    }
  } else {
    ['f-name','f-link','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-start').value = '';
    document.getElementById('f-due').value = '';
    document.getElementById('f-status').value = 'To do';
    document.getElementById('f-segment').value = 'Work';
    document.getElementById('f-priority').value = 'Medium';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) {
    document.getElementById('f-name').style.borderColor = 'var(--red)';
    document.getElementById('f-name').focus();
    return;
  }
  document.getElementById('f-name').style.borderColor = '';
  const task = {
    id: editingId || uid(),
    name,
    status: document.getElementById('f-status').value,
    segment: document.getElementById('f-segment').value,
    priority: document.getElementById('f-priority').value,
    start: document.getElementById('f-start').value,
    due: document.getElementById('f-due').value,
    link: document.getElementById('f-link').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  };
  if (editingId) {
    const i = tasks.findIndex(t => t.id === editingId);
    if (i > -1) tasks[i] = task;
  } else {
    tasks.push(task);
  }
  saveTasks();
  renderAll();
  closeModal();
}

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  if (btn) btn.classList.add('active');
  if (v === 'calendar') renderCalendar();
}

function askDelete(id) {
  confirmCb = () => { tasks = tasks.filter(t => t.id !== id); saveTasks(); renderAll(); };
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); confirmCb = null; }
function confirmAction() { if (confirmCb) confirmCb(); closeConfirm(); }

document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('confirm-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeConfirm(); } });

loadTasks();
</script>
</body>
</html>
