
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e22;
    --surface3: #26262c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --text2: #9a9aa8;
    --text3: #5c5c6e;
    --accent: #6b8afd;
    --accent-dim: rgba(107,138,253,0.15);
    --red: #e05a5a;
    --red-dim: rgba(224,90,90,0.15);
    --amber: #e8a44a;
    --amber-dim: rgba(232,164,74,0.15);
    --green: #52c48a;
    --green-dim: rgba(82,196,138,0.15);
    --purple: #b07ef8;
    --purple-dim: rgba(176,126,248,0.15);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app-shell { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem; padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }
  .app-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius); padding: 3px; border: 0.5px solid var(--border); }
  .tab { padding: 5px 16px; font-size: 13px; font-family: var(--font); border: none; background: transparent; color: var(--text2); border-radius: 6px; cursor: pointer; transition: all .15s; font-weight: 500; }
  .tab.active { background: var(--surface3); color: var(--text); border: 0.5px solid var(--border2); }
  .tab:hover:not(.active) { color: var(--text); }

  .btn { padding: 7px 16px; font-size: 13px; font-family: var(--font); font-weight: 500; border-radius: var(--radius); cursor: pointer; transition: all .15s; border: none; letter-spacing: -0.1px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost { background: transparent; color: var(--text2); border: 0.5px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: 0.88; }

  .stats-bar { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 18px; min-width: 80px; transition: border-color .15s; }
  .stat-card:hover { border-color: var(--border2); }
  .stat-num { font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; font-weight: 500; }

  .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filters select, .filters input[type="text"] {
    background: var(--surface); border: 0.5px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 12px; padding: 5px 10px;
    border-radius: var(--radius); height: 32px; outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: var(--accent); }
  .filters input[type="text"] { width: 180px; }

  .table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: visible; }
  .task-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .task-table th {
    font-size: 11px; font-weight: 600; color: var(--text3); text-align: left;
    padding: 10px 14px; border-bottom: 0.5px solid var(--border);
    text-transform: uppercase; letter-spacing: .7px; background: var(--surface2);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .task-table th:hover { color: var(--text2); }
  .task-table th .sort-arrow { margin-left: 4px; opacity: 0.4; font-style: normal; font-size: 10px; }
  .task-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
  .task-table td {
    font-size: 13px; padding: 10px 14px; border-bottom: 0.5px solid var(--border);
    vertical-align: middle; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tbody tr { transition: background .1s; }
  .task-table tbody tr:hover td { background: var(--surface2); }
  .task-table tbody tr.flash-green td { background: rgba(82,196,138,0.1) !important; transition: background .05s; }

  .col-name      { width: 19%; }
  .col-status    { width: 10%; }
  .col-segment   { width: 9%; }
  .col-priority  { width: 9%; }
  .col-start     { width: 8%; }
  .col-due       { width: 8%; }
  .col-completed { width: 9%; }
  .col-link      { width: 7%; }
  .col-notes     { width: 14%; }
  .col-actions   { width: 7%; }

  .task-name-cell { font-weight: 500; }

  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.1px; }
  .badge.clickable { cursor: pointer; transition: opacity .12s, transform .1s; }
  .badge.clickable:hover { opacity: 0.78; transform: scale(1.04); }
  .p-critical   { background: var(--red-dim);    color: var(--red);    }
  .p-high       { background: var(--amber-dim);  color: var(--amber);  }
  .p-medium     { background: var(--accent-dim); color: var(--accent); }
  .p-low        { background: var(--green-dim);  color: var(--green);  }
  .s-todo       { background: var(--surface3);   color: var(--text2);  }
  .s-inprogress { background: var(--purple-dim); color: var(--purple); }
  .s-complete   { background: var(--green-dim);  color: var(--green);  }
  .s-blocked    { background: var(--red-dim);    color: var(--red);    }
  .seg-work     { background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(107,138,253,0.25); }
  .seg-personal { background: var(--amber-dim);  color: var(--amber);  border: 0.5px solid rgba(232,164,74,0.25); }
  .seg-other    { background: var(--surface3);   color: var(--text2);  }

  .overdue { color: var(--red) !important; font-weight: 600; }
  .completed-date { color: var(--text3); font-size: 12px; font-style: italic; }
  .task-link-btn { color: var(--accent); font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
  .task-link-btn:hover { text-decoration: underline; }
  .action-btn { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 3px 6px; border-radius: 4px; transition: all .1s; }
  .action-btn:hover { background: var(--surface3); color: var(--text); }

  .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text3); }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; margin-top: 6px; }

  .inline-select-wrap { position: relative; display: inline-block; }
  @keyframes popIn { from { opacity:0; transform:scale(0.95) translateY(-4px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .inline-dropdown {
    position: fixed; z-index: 9999;
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 4px; min-width: 134px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55); animation: popIn .12s ease;
  }
  .inline-option { display: block; width: 100%; padding: 6px 10px; font-size: 13px; font-family: var(--font); background: transparent; border: none; color: var(--text2); text-align: left; cursor: pointer; border-radius: 5px; transition: background .1s; letter-spacing: -0.1px; }
  .inline-option:hover { background: var(--surface3); color: var(--text); }
  .inline-option.active-opt { color: var(--text); font-weight: 500; }
  .inline-option.active-opt::before { content: '✓ '; color: var(--green); font-size: 11px; }

  .date-clickable { cursor: pointer; padding: 2px 6px; border-radius: 5px; font-size: 12px; transition: background .12s; display: inline-block; }
  .date-clickable:hover { background: var(--surface3); }
  .date-clickable.empty { color: var(--accent); font-size: 11px; opacity: 0.7; }
  .date-clickable.empty:hover { opacity: 1; background: var(--accent-dim); }
  .inline-date-wrap { position: relative; display: inline-block; }

  .inline-date-picker {
    position: fixed; z-index: 9999;
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55); animation: popIn .12s ease;
    min-width: 210px;
  }
  .inline-date-picker label { display: block; font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
  .inline-date-picker input[type="date"] {
    background: var(--surface3); border: 0.5px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 13px; padding: 7px 10px;
    border-radius: var(--radius); outline: none; display: block; margin-bottom: 10px; width: 100%;
  }
  .inline-date-picker input[type="date"]:focus { border-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  .inline-date-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .inline-date-actions button { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--font); font-weight: 500; transition: opacity .1s; }
  .idb-cancel { background: transparent; color: var(--text2); border: 0.5px solid var(--border2) !important; }
  .idb-cancel:hover { background: var(--surface3); color: var(--text); }
  .idb-save { background: var(--accent); color: #fff; }
  .idb-save:hover { opacity: 0.88; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .cal-title { font-size: 16px; font-weight: 600; letter-spacing: -0.4px; }
  .cal-controls { display: flex; align-items: center; gap: 8px; }
  .cal-mode-tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius); padding: 2px; border: 0.5px solid var(--border); }
  .cal-mode-tab { padding: 3px 12px; font-size: 12px; font-family: var(--font); border: none; background: transparent; color: var(--text2); border-radius: 5px; cursor: pointer; font-weight: 500; transition: all .12s; }
  .cal-mode-tab.active { background: var(--surface3); color: var(--text); border: 0.5px solid var(--border2); }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); width: 30px; height: 30px; cursor: pointer; color: var(--text); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .12s; font-family: var(--font); }
  .cal-nav button.today-btn { width: auto; padding: 0 12px; font-size: 12px; font-weight: 500; }
  .cal-nav button:hover { background: var(--surface3); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-day-label { font-size: 11px; color: var(--text3); text-align: center; padding: 6px 0; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; }
  .cal-day { min-height: 88px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px; background: var(--surface); transition: border-color .1s; }
  .cal-day:hover { border-color: var(--border2); }
  .cal-day.today { border-color: var(--accent); background: var(--accent-dim); }
  .cal-day.other-month { background: transparent; opacity: .3; }
  .cal-day-num { font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 5px; font-variant-numeric: tabular-nums; }
  .cal-day.today .cal-day-num { color: var(--accent); }
  .cal-task-chip { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; font-weight: 500; }
  .cal-empty { font-size: 10px; color: var(--text3); margin-top: 6px; font-style: italic; }
  .cal-week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-week-day { min-height: 160px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; background: var(--surface); transition: border-color .1s; }
  .cal-week-day:hover { border-color: var(--border2); }
  .cal-week-day.today { border-color: var(--accent); background: var(--accent-dim); }
  .cal-week-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; text-align: center; padding: 6px 0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.75rem; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; animation: slideUp .2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; letter-spacing: -0.4px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .form-group label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select, .form-group textarea { background: var(--surface2); border: 0.5px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 12px; border-radius: var(--radius); outline: none; transition: border-color .15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 70px; resize: vertical; line-height: 1.5; }
  .form-group select option { background: var(--surface2); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }

  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.75rem; width: 340px; text-align: center; animation: slideUp .2s ease; }
  .confirm-box p { font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.6; }
  .confirm-footer { display: flex; gap: 8px; justify-content: center; }

  .view { display: none; }
  .view.active { display: block; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  @media (max-width: 860px) {
    .col-start, .col-notes, .col-segment, .col-completed { display: none; }
    .filters input[type="text"] { width: 120px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-title">Task<span>.</span></div>
    <div class="header-right">
      <div class="tabs">
        <button class="tab active" onclick="switchView('list', this)">List</button>
        <button class="tab" onclick="switchView('calendar', this)">Calendar</button>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ New task</button>
    </div>
  </div>

  <div id="view-list" class="view active">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="filters">
      <select id="filter-status" onchange="renderList()">
        <option value="">All statuses</option>
        <option>To do</option><option>In progress</option><option>Complete</option><option>Blocked</option>
      </select>
      <select id="filter-segment" onchange="renderList()">
        <option value="">All segments</option>
        <option>Work</option><option>Personal</option>
      </select>
      <select id="filter-priority" onchange="renderList()">
        <option value="">All priorities</option>
        <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search tasks..." oninput="renderList()">
    </div>
    <div class="table-wrap">
      <table class="task-table">
        <thead>
          <tr>
            <th class="col-name"      onclick="setSort('name')">         Task      <i class="sort-arrow" id="sa-name"></i></th>
            <th class="col-status"    onclick="setSort('status')">       Status    <i class="sort-arrow" id="sa-status"></i></th>
            <th class="col-segment"   onclick="setSort('segment')">      Segment   <i class="sort-arrow" id="sa-segment"></i></th>
            <th class="col-priority"  onclick="setSort('priority')">     Priority  <i class="sort-arrow" id="sa-priority"></i></th>
            <th class="col-start"     onclick="setSort('start')">        Start     <i class="sort-arrow" id="sa-start"></i></th>
            <th class="col-due"       onclick="setSort('due')">          Due       <i class="sort-arrow" id="sa-due"></i></th>
            <th class="col-completed" onclick="setSort('completedDate')">Completed <i class="sort-arrow" id="sa-completedDate"></i></th>
            <th class="col-link">Link</th>
            <th class="col-notes">Notes</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="task-tbody"></tbody>
      </table>
      <div id="empty-list" class="empty-state" style="display:none">
        <div class="empty-icon">✏️</div>
        <strong>No tasks yet</strong>
        <p>Hit <strong>+ New task</strong> to get started.</p>
      </div>
    </div>
  </div>

  <div id="view-calendar" class="view">
    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div class="cal-controls">
        <div class="cal-mode-tabs">
          <button class="cal-mode-tab active" onclick="setCalMode('month',this)">Month</button>
          <button class="cal-mode-tab" onclick="setCalMode('week',this)">Week</button>
        </div>
        <div class="cal-nav">
          <button onclick="calNav(-1)">&#8249;</button>
          <button class="today-btn" onclick="calNav(0)">Today</button>
          <button onclick="calNav(1)">&#8250;</button>
        </div>
      </div>
    </div>
    <div id="cal-day-labels"></div>
    <div id="cal-body" style="margin-top:4px"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">New task</h2>
    <div class="form-group">
      <label>Task name</label>
      <input id="f-name" type="text" placeholder="What needs doing?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option>To do</option><option>In progress</option><option>Complete</option><option>Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label>Segment</label>
        <select id="f-segment">
          <option>Work</option><option>Personal</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="f-priority">
        <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start date</label>
        <input id="f-start" type="date">
      </div>
      <div class="form-group">
        <label>Due date</label>
        <input id="f-due" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date completed</label>
        <input id="f-completedDate" type="date">
      </div>
      <div class="form-group"></div>
    </div>
    <div class="form-group">
      <label>File / URL link</label>
      <input id="f-link" type="text" placeholder="https:// or SharePoint/OneDrive URL">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional notes..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save task</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>Delete this task? This cannot be undone.</p>
    <div class="confirm-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmAction()">Delete</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'taskmanager_v4';
let tasks = [];
let editingId = null;
let confirmCb = null;
let sortField = 'priority';
let sortDir = 'asc';
let calMode = 'month';
let calYear, calMonth, calWeekStart;

// ── Storage ───────────────────────────────────────────────────────────────────
function loadTasks() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) tasks = JSON.parse(r); }
  catch(e) { tasks = []; }
  renderAll();
}
function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function statusClass(s)   { return {'To do':'s-todo','In progress':'s-inprogress','Complete':'s-complete','Blocked':'s-blocked'}[s]||'s-todo'; }
function priorityClass(p) { return {'Critical':'p-critical','High':'p-high','Medium':'p-medium','Low':'p-low'}[p]||'p-medium'; }
function segmentClass(s)  { return {'Work':'seg-work','Personal':'seg-personal'}[s]||'seg-other'; }
function chipColor(t) {
  return t.segment === 'Personal'
    ? 'background:rgba(232,164,74,0.2);color:#e8a44a'
    : 'background:rgba(107,138,253,0.2);color:#6b8afd';
}
function fmt(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y.slice(2)}`;
}
function isOverdue(d) {
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  return new Date(d+'T00:00:00') < t;
}
function flashRow(id) {
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (!row) return;
  row.classList.add('flash-green');
  setTimeout(() => row.classList.remove('flash-green'), 700);
}

// ── Sorting ───────────────────────────────────────────────────────────────────
const PRIO_ORDER   = ['Critical','High','Medium','Low'];
const STATUS_ORDER = ['Blocked','In progress','To do','Complete'];
function setSort(field) {
  if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'asc'; }
  renderList();
}
function updateSortArrows() {
  ['name','status','segment','priority','start','due','completedDate'].forEach(f => {
    const el = document.getElementById('sa-'+f); if (!el) return;
    const th = el.closest('th');
    if (sortField === f) { el.textContent = sortDir==='asc'?'↑':'↓'; th.classList.add('sorted'); }
    else { el.textContent = '↕'; th.classList.remove('sorted'); }
  });
}
function sortTasks(arr) {
  return [...arr].sort((a,b) => {
    let va, vb;
    if (sortField==='priority') { va=PRIO_ORDER.indexOf(a.priority);   vb=PRIO_ORDER.indexOf(b.priority); }
    else if (sortField==='status') { va=STATUS_ORDER.indexOf(a.status); vb=STATUS_ORDER.indexOf(b.status); }
    else { va=(a[sortField]||'').toLowerCase(); vb=(b[sortField]||'').toLowerCase(); }
    if (va<vb) return sortDir==='asc'?-1:1;
    if (va>vb) return sortDir==='asc'? 1:-1;
    return 0;
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const total    = tasks.length;
  const complete = tasks.filter(t=>t.status==='Complete').length;
  const inprog   = tasks.filter(t=>t.status==='In progress').length;
  const blocked  = tasks.filter(t=>t.status==='Blocked').length;
  const overdue  = tasks.filter(t=>t.status!=='Complete'&&isOverdue(t.due)).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${inprog}</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${complete}</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${blocked}</div><div class="stat-label">Blocked</div></div>
    ${overdue>0?`<div class="stat-card"><div class="stat-num" style="color:var(--amber)">${overdue}</div><div class="stat-label">Overdue</div></div>`:''}
  `;
}

// ── List View ─────────────────────────────────────────────────────────────────
function renderList() {
  const fs   = document.getElementById('filter-status').value;
  const fseg = document.getElementById('filter-segment').value;
  const fp   = document.getElementById('filter-priority').value;
  const fq   = document.getElementById('filter-search').value.toLowerCase();
  let filtered = tasks.filter(t => {
    if (fs   && t.status!==fs)   return false;
    if (fseg && t.segment!==fseg) return false;
    if (fp   && t.priority!==fp)  return false;
    if (fq   && !t.name.toLowerCase().includes(fq) && !(t.notes||'').toLowerCase().includes(fq)) return false;
    return true;
  });
  filtered = sortTasks(filtered);
  updateSortArrows();
  const tbody = document.getElementById('task-tbody');
  const empty = document.getElementById('empty-list');
  if (!filtered.length) { tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    tbody.innerHTML = filtered.map(t => {
      const od = t.status!=='Complete' && isOverdue(t.due);
      const notesTrunc = t.notes?(t.notes.length>35?t.notes.slice(0,35)+'…':t.notes):'';
      const completedCell = t.completedDate ? `<span class="completed-date">${fmt(t.completedDate)}</span>` : '';
      return `<tr data-id="${t.id}">
        <td class="col-name task-name-cell" title="${t.name}">${t.name}</td>
        <td class="col-status"><div class="inline-select-wrap"><span class="badge ${statusClass(t.status)} clickable" onclick="openInlineSelect(event,'${t.id}','status')">${t.status}</span></div></td>
        <td class="col-segment"><div class="inline-select-wrap"><span class="badge ${segmentClass(t.segment)} clickable" onclick="openInlineSelect(event,'${t.id}','segment')">${t.segment||'—'}</span></div></td>
        <td class="col-priority"><div class="inline-select-wrap"><span class="badge ${priorityClass(t.priority)} clickable" onclick="openInlineSelect(event,'${t.id}','priority')">${t.priority}</span></div></td>
        <td class="col-start" style="color:var(--text2);font-size:12px">${fmt(t.start)}</td>
        <td class="col-due"><div class="inline-date-wrap"><span class="date-clickable${t.due?(od?' overdue':''):' empty'}" onclick="openInlineDate(event,'${t.id}','due')">${t.due?fmt(t.due)+(od?' !':''):'+ set date'}</span></div></td>
        <td class="col-completed">${completedCell}</td>
        <td class="col-link">${t.link?`<a class="task-link-btn" href="${t.link}" target="_blank" rel="noopener">🔗 link</a>`:''}</td>
        <td class="col-notes" style="color:var(--text2);font-size:12px" title="${t.notes||''}">${notesTrunc}</td>
        <td class="col-actions" style="white-space:nowrap">
          <button class="action-btn" onclick="openModal('${t.id}')" title="Edit">✎</button>
          <button class="action-btn" onclick="askDelete('${t.id}')" title="Delete">✕</button>
        </td>
      </tr>`;
    }).join('');
  }
  renderStats();
}

// ── Inline Editing ────────────────────────────────────────────────────────────
const INLINE_OPTIONS = {
  status:   ['To do','In progress','Complete','Blocked'],
  priority: ['Critical','High','Medium','Low'],
  segment:  ['Work','Personal']
};

function closeAllInline() {
  document.querySelectorAll('.inline-dropdown,.inline-date-picker').forEach(el=>el.remove());
}

function placePopup(el, rect) {
  const spaceBelow = window.innerHeight - rect.bottom;
  const elH = el.offsetHeight || 180;
  if (spaceBelow < elH + 8) {
    el.style.top = 'auto';
    el.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  } else {
    el.style.top = (rect.bottom + 4) + 'px';
    el.style.bottom = 'auto';
  }
  el.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 230)) + 'px';
}

function openInlineSelect(e, id, field) {
  e.stopPropagation();
  closeAllInline();
  const task = tasks.find(t=>t.id===id);
  if (!task) return;
  const rect = e.target.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'inline-dropdown';
  INLINE_OPTIONS[field].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'inline-option'+(task[field]===opt?' active-opt':'');
    btn.textContent = opt;
    btn.onclick = ev => {
      ev.stopPropagation();
      const wasComplete = task.status === 'Complete';
      task[field] = opt;
      if (field === 'status') {
        if (opt === 'Complete' && !task.completedDate) task.completedDate = todayStr();
        else if (opt !== 'Complete' && wasComplete) task.completedDate = '';
      }
      saveTasks(); renderAll();
      setTimeout(() => flashRow(id), 30);
    };
    dropdown.appendChild(btn);
  });
  document.body.appendChild(dropdown);
  requestAnimationFrame(() => placePopup(dropdown, rect));
}

function openInlineDate(e, id, field) {
  e.stopPropagation();
  closeAllInline();
  const task = tasks.find(t=>t.id===id);
  if (!task) return;
  const rect = e.target.getBoundingClientRect();

  const picker = document.createElement('div');
  picker.className = 'inline-date-picker';

  const lbl = document.createElement('label');
  lbl.textContent = field === 'due' ? 'Due date' : 'Date';
  picker.appendChild(lbl);

  const input = document.createElement('input');
  input.type = 'date';
  input.value = task[field] || '';
  picker.appendChild(input);

  const actions = document.createElement('div');
  actions.className = 'inline-date-actions';

  const cancel = document.createElement('button');
  cancel.className = 'idb-cancel';
  cancel.textContent = 'Cancel';
  cancel.onclick = ev => { ev.stopPropagation(); closeAllInline(); };

  const save = document.createElement('button');
  save.className = 'idb-save';
  save.textContent = 'Save';
  save.onclick = ev => {
    ev.stopPropagation();
    task[field] = input.value;
    saveTasks(); renderAll();
    setTimeout(() => flashRow(id), 30);
  };

  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); save.click(); }
    if (ev.key === 'Escape') closeAllInline();
  });

  actions.appendChild(cancel);
  actions.appendChild(save);
  picker.appendChild(actions);
  document.body.appendChild(picker);

  requestAnimationFrame(() => {
    placePopup(picker, rect);
    input.focus();
  });
}

document.addEventListener('click', () => closeAllInline());

// ── Calendar ──────────────────────────────────────────────────────────────────
function dateStrOf(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekStart(date) {
  const d = new Date(date); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d;
}
function getTasksForDay(ds) {
  return tasks.filter(t => {
    if (!t.due) return false;
    if (t.start && t.start<=ds && t.due>=ds) return true;
    return t.due===ds;
  });
}

function renderCalendar() {
  const now = new Date(), today = dateStrOf(now);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  if (calMode === 'week') {
    if (!calWeekStart) calWeekStart = getWeekStart(now);
    const we = new Date(calWeekStart); we.setDate(we.getDate()+6);
    const fs = d=>`${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
    document.getElementById('cal-title').textContent = `${fs(calWeekStart)} – ${fs(we)}, ${we.getFullYear()}`;
    const labelsEl = document.getElementById('cal-day-labels');
    labelsEl.className = 'cal-week-grid'; labelsEl.innerHTML = '';
    const body = document.getElementById('cal-body'); body.innerHTML = '';
    const grid = document.createElement('div'); grid.className = 'cal-week-grid';
    for (let i=0;i<7;i++) {
      const d = new Date(calWeekStart); d.setDate(d.getDate()+i);
      const ds = dateStrOf(d);
      const lbl = document.createElement('div'); lbl.className='cal-week-label'; lbl.textContent=DAYS[d.getDay()]; labelsEl.appendChild(lbl);
      const dayTasks = getTasksForDay(ds);
      const chips = dayTasks.slice(0,7).map(t=>`<div class="cal-task-chip" style="${chipColor(t)};margin-bottom:3px" title="${t.name} · ${t.segment||''}">${t.name}</div>`).join('');
      const more  = dayTasks.length>7?`<div style="font-size:10px;color:var(--text3)">+${dayTasks.length-7} more</div>`:'';
      const empty = dayTasks.length===0?`<div class="cal-empty">clear</div>`:'';
      const cell = document.createElement('div'); cell.className=`cal-week-day${ds===today?' today':''}`;
      cell.innerHTML = `<div class="cal-day-num">${d.getDate()}</div>${chips}${more}${empty}`;
      grid.appendChild(cell);
    }
    body.appendChild(grid);
  } else {
    if (calYear===undefined) { calYear=now.getFullYear(); calMonth=now.getMonth(); }
    document.getElementById('cal-title').textContent = `${MONTHS[calMonth]} ${calYear}`;
    const labelsEl = document.getElementById('cal-day-labels');
    labelsEl.className = 'cal-grid';
    labelsEl.innerHTML = DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
    const firstDay=new Date(calYear,calMonth,1).getDay(), dim=new Date(calYear,calMonth+1,0).getDate(), dip=new Date(calYear,calMonth,0).getDate();
    let cells=[];
    for(let i=0;i<firstDay;i++){const d=dip-firstDay+1+i;cells.push({day:d,cur:false,ds:`${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
    for(let d=1;d<=dim;d++){cells.push({day:d,cur:true,ds:`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
    let ex=0; while(cells.length%7!==0){ex++;cells.push({day:ex,cur:false,ds:''});}
    document.getElementById('cal-body').innerHTML=`<div class="cal-grid">${cells.map(c=>{
      const isToday=c.ds===today, dayTasks=c.cur?getTasksForDay(c.ds):[];
      const chips=dayTasks.slice(0,3).map(t=>`<div class="cal-task-chip" style="${chipColor(t)}" title="${t.name} · ${t.segment||''}">${t.name}</div>`).join('');
      const more=dayTasks.length>3?`<div style="font-size:10px;color:var(--text3)">+${dayTasks.length-3} more</div>`:'';
      const empty=c.cur&&dayTasks.length===0?`<div class="cal-empty">clear</div>`:'';
      return `<div class="cal-day${isToday?' today':''}${!c.cur?' other-month':''}"><div class="cal-day-num">${c.day}</div>${chips}${more}${empty}</div>`;
    }).join('')}</div>`;
  }
}

function setCalMode(mode,btn) {
  calMode=mode;
  document.querySelectorAll('.cal-mode-tab').forEach(el=>el.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(mode==='week'&&!calWeekStart)calWeekStart=getWeekStart(new Date());
  renderCalendar();
}
function calNav(dir) {
  if(calMode==='week'){
    if(!calWeekStart)calWeekStart=getWeekStart(new Date());
    if(dir===0)calWeekStart=getWeekStart(new Date());
    else{calWeekStart=new Date(calWeekStart);calWeekStart.setDate(calWeekStart.getDate()+dir*7);}
  } else {
    if(dir===0){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
    else{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}}
  }
  renderCalendar();
}

// ── Views ─────────────────────────────────────────────────────────────────────
function renderAll() { renderList(); renderCalendar(); }
function switchView(v,btn) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(btn)btn.classList.add('active');
  if(v==='calendar')renderCalendar();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id||null;
  document.getElementById('modal-title').textContent = id?'Edit task':'New task';
  if (id) {
    const t = tasks.find(x=>x.id===id);
    if (t) {
      document.getElementById('f-name').value          = t.name||'';
      document.getElementById('f-status').value        = t.status||'To do';
      document.getElementById('f-segment').value       = t.segment||'Work';
      document.getElementById('f-priority').value      = t.priority||'Medium';
      document.getElementById('f-start').value         = t.start||'';
      document.getElementById('f-due').value           = t.due||'';
      document.getElementById('f-completedDate').value = t.completedDate||'';
      document.getElementById('f-link').value          = t.link||'';
      document.getElementById('f-notes').value         = t.notes||'';
    }
  } else {
    ['f-name','f-link','f-notes'].forEach(i=>document.getElementById(i).value='');
    ['f-start','f-due','f-completedDate'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-status').value='To do';
    document.getElementById('f-segment').value='Work';
    document.getElementById('f-priority').value='Medium';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').style.borderColor='var(--red)'; document.getElementById('f-name').focus(); return; }
  document.getElementById('f-name').style.borderColor='';
  const newStatus = document.getElementById('f-status').value;
  let completedDate = document.getElementById('f-completedDate').value;
  if (newStatus==='Complete' && !completedDate) completedDate = todayStr();
  if (newStatus!=='Complete') completedDate = '';
  const task = {
    id: editingId||uid(), name,
    status: newStatus,
    segment: document.getElementById('f-segment').value,
    priority: document.getElementById('f-priority').value,
    start: document.getElementById('f-start').value,
    due: document.getElementById('f-due').value,
    completedDate,
    link: document.getElementById('f-link').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  };
  if (editingId) { const i=tasks.findIndex(t=>t.id===editingId); if(i>-1)tasks[i]=task; }
  else tasks.push(task);
  saveTasks(); renderAll(); closeModal();
}

// ── Confirm Delete ────────────────────────────────────────────────────────────
function askDelete(id) {
  confirmCb = ()=>{tasks=tasks.filter(t=>t.id!==id);saveTasks();renderAll();};
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); confirmCb=null; }
function confirmAction() { if(confirmCb)confirmCb(); closeConfirm(); }

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('confirm-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeConfirm();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeConfirm();closeAllInline();}});

loadTasks();
</script>
